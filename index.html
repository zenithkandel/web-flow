<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Web Dev Roadflow</title>
    <meta
      name="description"
      content="A simple workflow to learn full stack web development without overload."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;700&family=Manrope:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="page">
      <section class="content-head" aria-label="Workflow intro">
        <p class="kicker">Simple Full Stack Learning Workflow</p>
        <h1>Open a card. Learn one concept. Keep moving.</h1>
      </section>

      <section
        class="learning-grid"
        id="workflowCards"
        aria-label="Web development learning workflow"
      >
        <article class="learn-card" data-step="1">
          <button class="card-head" type="button" aria-haspopup="dialog">
            <div class="card-shell">
              <div class="card-face front">
                <span class="step">01</span>
                <h2>What is web and how it works</h2>
                <p>Tap to flip + open details</p>
              </div>
              <div class="card-face back" aria-hidden="true">
                <span class="tiny">Quick View</span>
                <p>Browser asks, server answers, page renders.</p>
              </div>
            </div>
          </button>
        </article>

        <article class="learn-card" data-step="2">
          <button class="card-head" type="button" aria-haspopup="dialog">
            <div class="card-shell">
              <div class="card-face front">
                <span class="step">02</span>
                <h2>Frontend vs backend</h2>
                <p>Tap to flip + open details</p>
              </div>
              <div class="card-face back" aria-hidden="true">
                <span class="tiny">Quick View</span>
                <p>Frontend is visuals, backend is logic and data.</p>
              </div>
            </div>
          </button>
        </article>

        <article class="learn-card" data-step="3">
          <button class="card-head" type="button" aria-haspopup="dialog">
            <div class="card-shell">
              <div class="card-face front">
                <span class="step">03</span>
                <h2>How frontend communicates with backend (API)</h2>
                <p>Tap to flip + open details</p>
              </div>
              <div class="card-face back" aria-hidden="true">
                <span class="tiny">Quick View</span>
                <p>Requests go out, JSON comes back.</p>
              </div>
            </div>
          </button>
        </article>

        <article class="learn-card" data-step="4">
          <button class="card-head" type="button" aria-haspopup="dialog">
            <div class="card-shell">
              <div class="card-face front">
                <span class="step">04</span>
                <h2>What is database</h2>
                <p>Tap to flip + open details</p>
              </div>
              <div class="card-face back" aria-hidden="true">
                <span class="tiny">Quick View</span>
                <p>A storage system for your app's information.</p>
              </div>
            </div>
          </button>
        </article>

        <article class="learn-card" data-step="5">
          <button class="card-head" type="button" aria-haspopup="dialog">
            <div class="card-shell">
              <div class="card-face front">
                <span class="step">05</span>
                <h2>How is database contacted</h2>
                <p>Tap to flip + open details</p>
              </div>
              <div class="card-face back" aria-hidden="true">
                <span class="tiny">Quick View</span>
                <p>Backend connects, queries, then returns results.</p>
              </div>
            </div>
          </button>
        </article>

        <article class="learn-card" data-step="6">
          <button class="card-head" type="button" aria-haspopup="dialog">
            <div class="card-shell">
              <div class="card-face front">
                <span class="step">06</span>
                <h2>CRUD</h2>
                <p>Tap to flip + open details</p>
              </div>
              <div class="card-face back" aria-hidden="true">
                <span class="tiny">Quick View</span>
                <p>Create, Read, Update, Delete: your app basics.</p>
              </div>
            </div>
          </button>
        </article>

        <article class="learn-card" data-step="7">
          <button class="card-head" type="button" aria-haspopup="dialog">
            <div class="card-shell">
              <div class="card-face front">
                <span class="step">07</span>
                <h2>What is auth</h2>
                <p>Tap to flip + open details</p>
              </div>
              <div class="card-face back" aria-hidden="true">
                <span class="tiny">Quick View</span>
                <p>Verify identity, then control access.</p>
              </div>
            </div>
          </button>
        </article>

        <article class="learn-card" data-step="8">
          <button class="card-head" type="button" aria-haspopup="dialog">
            <div class="card-shell">
              <div class="card-face front">
                <span class="step">08</span>
                <h2>UIUX and SEO</h2>
                <p>Tap to flip + open details</p>
              </div>
              <div class="card-face back" aria-hidden="true">
                <span class="tiny">Quick View</span>
                <p>Build clear design and pages search engines can read.</p>
              </div>
            </div>
          </button>
        </article>
      </section>

      <div class="modal" id="detailModal" aria-hidden="true">
        <div class="modal-backdrop" data-close-modal="true"></div>
        <section
          class="modal-panel"
          role="dialog"
          aria-modal="true"
          aria-labelledby="modalTitle"
        >
          <button
            class="modal-close"
            id="modalCloseBtn"
            type="button"
            aria-label="Close"
          >
            x
          </button>
          <p class="modal-step" id="modalStepLabel"></p>
          <h2 id="modalTitle"></h2>
          <p id="modalDescription"></p>
          <ul id="modalPoints"></ul>
          <p class="prompt-preview" id="modalPromptPreview"></p>
          <button class="copy-btn" id="modalCopyBtn" type="button">
            Copy detailed prompt
          </button>
        </section>
      </div>
    </main>

    <script src="app.js"></script>
  </body>
</html>
